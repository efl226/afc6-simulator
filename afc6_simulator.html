<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>AFC-6 · Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  @font-face{font-family:'DSEG7';src:url('https://cdn.jsdelivr.net/gh/keshikan/DSEG@0.46/fonts/DSEG7-Classic/DSEG7Classic-Bold.woff2') format('woff2');font-display:swap;}
  :root{
    --paper:#edeae1; --paper2:#e4e0d5; --line:#d8d3c6;
    --ink:#1c1b18; --mut:#8d8779; --faint:#a9a397;
    --org:#f0892e; --org-deep:#d9701a;
    --amber:#d9a534; --green:#3f9d6e; --gray:#9a958a;
    --card:#f6f4ee; --cardline:#e2ddd0;
    --term:#0c0d10;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:
      radial-gradient(120% 80% at 18% -10%, #f6f3ea 0%, transparent 55%),
      radial-gradient(120% 100% at 100% 120%, #e7e2d4 0%, transparent 60%),
      var(--paper);
    color:var(--ink);font-family:'Bricolage Grotesque',sans-serif;
    background-attachment:fixed;min-height:100vh;
  }
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:34px 34px;opacity:.16;mask-image:radial-gradient(120% 90% at 40% 20%,#000 30%,transparent 80%)}
  .mono{font-family:'JetBrains Mono',monospace}

  header{position:relative;z-index:2;display:flex;align-items:baseline;justify-content:space-between;
    padding:26px 40px 0;flex-wrap:wrap;gap:10px}
  .brand{display:flex;align-items:baseline;gap:14px}
  .brand h1{margin:0;font-size:30px;font-weight:800;letter-spacing:-1.2px}
  .brand h1 b{color:var(--org)}
  .brand .tag{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--mut);font-family:'JetBrains Mono',monospace}
  .status{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:2px;text-transform:uppercase;
    color:var(--mut);font-family:'JetBrains Mono',monospace}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(63,157,110,.6);animation:pulse 2.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(63,157,110,.5)}70%{box-shadow:0 0 0 7px rgba(63,157,110,0)}100%{box-shadow:0 0 0 0 rgba(63,157,110,0)}}

  main{position:relative;z-index:2;display:flex;gap:40px;padding:30px 40px 60px;align-items:flex-start;flex-wrap:wrap}
  .reveal{opacity:0;transform:translateY(14px);animation:rise .7s cubic-bezier(.2,.7,.2,1) forwards}
  @keyframes rise{to{opacity:1;transform:none}}

  /* ---- PANEL ---- */
  .stage{display:flex;flex-direction:column;gap:20px;animation-delay:.05s}
  .panelwrap{position:relative;width:700px}
  .panelwrap::before{content:"";position:absolute;left:50%;top:54%;width:78%;height:62%;transform:translate(-50%,-50%);
    background:radial-gradient(closest-side,rgba(240,137,46,.30),transparent 72%);filter:blur(36px);z-index:0}
  .panel{position:relative;z-index:1;width:700px;height:537px;filter:drop-shadow(0 30px 50px rgba(40,30,15,.30))}
  .panel .bg{position:absolute;inset:0;width:100%;height:100%}
  .gloss{position:absolute;inset:0;z-index:2;pointer-events:none;border-radius:40px;
    background:radial-gradient(120% 70% at 28% 8%,rgba(255,255,255,.10),transparent 46%);
    mask-image:url(#m)}
  .panel .layer{position:absolute;inset:0;z-index:3}
  .c,.p,.disp,.stepper,.startstop,.shake{position:absolute;transform:translate(-50%,-50%);user-select:none}
  .c{display:flex;flex-direction:column;align-items:center;gap:3px;color:#7f7f7f;cursor:pointer;transition:color .18s,transform .1s}
  .c:active{transform:translate(-50%,-50%) scale(.92)}
  .c svg{width:30px;height:30px}
  .c .lab{font-size:12.5px;letter-spacing:.2px;white-space:nowrap;font-weight:400}
  .c.lit{color:var(--org);filter:drop-shadow(0 0 7px rgba(240,137,46,.55))}
  .c.dis{opacity:.32;pointer-events:none}
  .c .ul{height:2.5px;width:34px;background:var(--org);border-radius:2px;opacity:0;transition:.18s;box-shadow:0 0 6px var(--org)}
  .c.lit .ul{opacity:1}
  .p{font-size:14px;color:#7b7b7b;cursor:pointer;white-space:nowrap;font-weight:400;transition:.16s;letter-spacing:.2px}
  .p:hover{color:#bdbdbd}
  .p.sel{color:#fff;text-shadow:0 0 12px rgba(255,255,255,.35)}
  .p.dis{opacity:.32;pointer-events:none}
  .disp-wrap{position:absolute;transform:translate(-50%,-50%);text-align:center}
  .disp,.ghost{font-family:'DSEG7','JetBrains Mono',monospace;font-weight:700;font-size:50px;letter-spacing:2px;line-height:1}
  .ghost{position:absolute;inset:0;color:#fff;opacity:.07}
  .disp{position:relative;color:#fff;filter:drop-shadow(0 0 10px rgba(255,255,255,.22))}
  .disp.cooking{color:#fff;filter:drop-shadow(0 0 12px rgba(240,137,46,.30))}
  .stepper{display:flex;flex-direction:column;align-items:center;gap:18px;color:#9a9a9a}
  .stepper .arr{cursor:pointer;line-height:0;transition:.12s}.stepper .arr:hover{color:#fff;transform:scale(1.12)}
  .stepper .arr svg{width:30px;height:15px}
  .stepper .mid{font-size:14px;letter-spacing:.4px}
  .stepper.dis{opacity:.32;pointer-events:none}
  .startstop{text-align:center;cursor:pointer;color:#cfcfcf}
  .startstop.on{color:#fff}
  .startstop .t{font-size:18px;font-weight:600;letter-spacing:.4px}
  .startstop .ln{height:1.6px;background:currentColor;margin:3px auto;width:56px;opacity:.85}
  .shake{color:#7b7b7b;cursor:pointer;font-size:14px;letter-spacing:.4px}
  .shake.lit{color:var(--org);filter:drop-shadow(0 0 7px rgba(240,137,46,.5))}
  .shake.dis{opacity:.32;pointer-events:none}
  .hint{font-size:11px;color:var(--mut);font-family:'JetBrains Mono',monospace;letter-spacing:.3px;text-align:center;margin-top:2px}
  .hint b{color:var(--org-deep)}

  /* ---- TERMINAL ---- */
  .terminal{width:700px;background:var(--term);border-radius:14px;overflow:hidden;border:1px solid #20222a;
    box-shadow:0 18px 40px rgba(30,25,15,.18)}
  .tbar{display:flex;align-items:center;gap:7px;padding:10px 14px;background:#15171d;border-bottom:1px solid #23252e}
  .tbar i{width:11px;height:11px;border-radius:50%}
  .tbar .r{background:#ff5f57}.tbar .y{background:#febc2e}.tbar .g{background:#28c840}
  .tbar span{margin-left:8px;font-size:11px;color:#6f7480;font-family:'JetBrains Mono',monospace;letter-spacing:.5px}
  .tbody{height:172px;overflow:auto;padding:12px 16px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#8fe6ac;line-height:1.65}
  .tbody .ev{color:#ffce6b}.tbody .ar{color:#84b6ff}.tbody .mt{color:#5b6070}
  .tbody::-webkit-scrollbar{width:8px}.tbody::-webkit-scrollbar-thumb{background:#23252e;border-radius:4px}

  /* ---- TELEMETRY ---- */
  .rail{display:flex;flex-direction:column;gap:18px;width:470px;animation-delay:.15s}
  .card{background:var(--card);border:1px solid var(--cardline);border-radius:16px;padding:18px 18px 16px;
    box-shadow:0 12px 30px rgba(40,30,15,.06)}
  .card h2{margin:0 0 1px;font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--mut);font-family:'JetBrains Mono',monospace}
  .card .now{margin:0 0 12px;font-size:13px;color:#555}
  .card .now b{color:var(--org);font-weight:700}

  .canvas{position:relative;width:434px;height:560px;margin:2px auto 0}
  .canvas svg{position:absolute;inset:0;width:100%;height:100%}
  .cookzone{position:absolute;border:1.5px dashed #d6c79f;background:rgba(247,239,221,.6);border-radius:14px}
  .cookzone span{position:absolute;top:6px;left:11px;font-size:9px;letter-spacing:1.5px;color:#b7913f;font-family:'JetBrains Mono',monospace}
  .node{position:absolute;width:120px;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;font-size:11.5px;font-weight:700;border:1.5px solid;background:#fff;padding:7px 4px;line-height:1.12;transition:.18s}
  .node small{font-weight:400;color:#8c8c8c;font-size:9px;font-family:'JetBrains Mono',monospace;letter-spacing:.2px}
  .node.happy{border-color:#e6983f;background:#fff4e7}
  .node.offc{border-color:#a7a39a;background:#edeee9}
  .node.donec{border-color:#46a073;background:#e6f4ec}
  .node.intc{border-color:#dcab3a;background:#fff8e6}
  .node.active{box-shadow:0 0 0 4px rgba(240,137,46,.42),0 6px 16px rgba(240,137,46,.18);transform:scale(1.06);z-index:5;animation:gl 1.6s ease-in-out infinite}
  @keyframes gl{50%{box-shadow:0 0 0 6px rgba(240,137,46,.28),0 6px 18px rgba(240,137,46,.22)}}
  .legend{font-size:10.5px;color:#777;line-height:1.65;margin-top:12px;font-family:'JetBrains Mono',monospace}
  .legend b{color:#444}
  .sw{display:inline-block;width:9px;height:9px;border-radius:2px;vertical-align:middle;margin-right:3px}

  .kv{display:grid;grid-template-columns:auto 1fr;gap:6px 16px;font-family:'JetBrains Mono',monospace;font-size:12.5px}
  .kv .k{color:var(--mut);letter-spacing:.3px}
  .kv .v{font-weight:600;color:var(--ink);text-align:right;font-variant-numeric:tabular-nums}
  .kv .v.hot{color:var(--org)}
  .kv .v.warn{color:var(--org-deep)}
  .avail{display:flex;flex-wrap:wrap;gap:7px}
  .pill{font-family:'JetBrains Mono',monospace;font-size:11px;background:#fff;border:1px solid #e3ddcf;border-radius:20px;padding:5px 11px;color:#4a4a44}
  .pill.auto{border-style:dashed;color:#9a958a}
  .pill.glob{background:#faf6ee;color:#9a958a;border-color:#e9e2d2}
</style>
</head>

<div id="root"></div>
<svg width="0" height="0"><defs><clipPath id="m" clipPathUnits="objectBoundingBox"></clipPath></defs></svg>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<script type="text/jsx-src" id="appsrc">
const {useReducer,useEffect,useState,useRef}=React;

/* ===================== MACHINE ===================== */
const DUAL=new Set(['bake','roast','wings','recrisp','toast','veggies','frozen snacks','fries','max crisp']);
const PRESETS={bake:{t:45,T:350},roast:{t:40,T:380},broil:{t:25,T:450},wings:{t:36,T:400},recrisp:{t:20,T:375},
  toast:{t:14,T:400},veggies:{t:24,T:375},'frozen snacks':{t:26,T:400},fries:{t:30,T:400},'max crisp':{t:24,T:450},'keep warm':{t:60,T:165}};
const AUTO_OFF=120,KEEP_WARM=25,BASKET_TO=25;
const COOK=['running','paused','basketOut','shakeAlert','shakeWaiting'];
const initCtx={fn:null,dual:false,time:0,temp:350,rem:0,total:0,shake:false,shaken:false,light:false,vol:true,basket:true,last:null,fav:null};
const clamp=t=>Math.min(450,Math.max(120,t));

function transition(S,C0,ev,arg){
  let C={...C0},msg='';
  if(ev==='LIGHT_TOGGLE'){C.light=!C.light;return{S,C,msg};}
  if(ev==='VOLUME_TOGGLE'){C.vol=!C.vol;return{S,C,msg};}
  if(ev==='POWER_OFF'){return{S:'off',C,msg};}
  if((ev==='BASKET_REMOVED'||ev==='BASKET_INSERTED')&&!COOK.includes(S)){C.basket=(ev==='BASKET_INSERTED');return{S,C,msg};}
  const setFn=fn=>{C.fn=fn;C.dual=DUAL.has(fn);C.time=PRESETS[fn].t;C.temp=PRESETS[fn].T;};
  const recall=o=>{if(o){C.fn=o.fn;C.time=o.time;C.temp=o.temp;C.dual=o.dual;}};
  switch(S){
    case'off': if(ev==='POWER'){C={...initCtx,light:C.light,vol:C.vol,last:C.last,fav:C.fav};S='idle';} break;
    case'idle':
      if(ev==='SELECT_FUNCTION'){setFn(arg);S='set';}
      else if(ev==='ADJUST_TIME'){C.time=Math.max(0,C.time+arg);C.fn=null;S='set';}
      else if(ev==='ADJUST_TEMP'){C.temp=clamp(C.temp+arg);C.fn=null;S='set';}
      else if(ev==='LAST_COOK'&&C.last){recall(C.last);S='set';}
      else if(ev==='FAVORITE'&&C.fav){recall(C.fav);S='set';}
      else if(ev==='AUTO_OFF'){S='off';} break;
    case'set':
      if(ev==='SELECT_FUNCTION')setFn(arg);
      else if(ev==='ADJUST_TIME'){C.time=Math.max(0,C.time+arg);C.fn=null;}
      else if(ev==='ADJUST_TEMP'){C.temp=clamp(C.temp+arg);C.fn=null;}
      else if(ev==='TOGGLE_SHAKE')C.shake=!C.shake;
      else if(ev==='LAST_COOK'&&C.last)recall(C.last);
      else if(ev==='FAVORITE'&&C.fav)recall(C.fav);
      else if(ev==='SAVE_FAVORITE'){C.fav={fn:C.fn,time:C.time,temp:C.temp,dual:C.dual};msg='★ Favorite saved';}
      else if(ev==='START'){if(C.basket&&C.time>0){C.rem=C.time;C.total=C.time;C.shaken=false;C.last={fn:C.fn,time:C.time,temp:C.temp,dual:C.dual};S='running';}else msg=C.basket?'Set a time first':'Lock the basket in';}
      else if(ev==='AUTO_OFF')S='off'; break;
    case'running':
      if(ev==='TICK'){C.rem--;if(C.rem<=0)S='done';else if(C.shake&&!C.shaken&&C.rem<=Math.ceil(C.total/2)){C.shaken=true;S='shakeAlert';}}
      else if(ev==='PAUSE'||ev==='START')S='paused';
      else if(ev==='STOP')S='set';
      else if(ev==='ADJUST_TIME'){C.rem=Math.max(0,C.rem+arg);C.fn=null;}
      else if(ev==='ADJUST_TEMP'){C.temp=clamp(C.temp+arg);C.fn=null;}
      else if(ev==='ADD_30')C.rem+=30;
      else if(ev==='BASKET_REMOVED'){C.basket=false;S='basketOut';} break;
    case'shakeAlert': if(ev==='BASKET_REMOVED'){C.basket=false;S='shakeWaiting';} break;
    case'shakeWaiting': if(ev==='BASKET_INSERTED'){C.basket=true;S='running';} break;
    case'paused':
      if(ev==='START'||ev==='PAUSE')S='running';
      else if(ev==='STOP')S='set';
      else if(ev==='BASKET_REMOVED'){C.basket=false;S='basketOut';} break;
    case'basketOut':
      if(ev==='BASKET_INSERTED'){C.basket=true;S='running';}
      else if(ev==='BASKET_TIMEOUT')S='set'; break;
    case'done':
      if(ev==='POWER'||ev==='STOP'||ev==='START')S='set';
      else if(ev==='SELECT_FUNCTION'){setFn(arg);S='set';}
      else if(ev==='KEEP_WARM'){C={...initCtx,light:C.light,vol:C.vol,last:C.last,fav:C.fav};S='idle';} break;
  }
  return{S,C,msg};
}

const PRETTY={off:'OFF',idle:'IDLE',set:'SET',running:'COOKING',paused:'PAUSED',basketOut:'BASKET OUT',shakeAlert:'SHAKE ALERT',shakeWaiting:'SHAKE WAIT',done:'DONE'};
function reducer(st,a){
  if(a.type!=='SEND')return st;
  const prev=st.S, r=transition(st.S,st.C,a.ev,a.arg);
  const log = a.ev==='TICK' ? st.log : [...st.log,{ev:a.ev,from:prev,to:r.S}].slice(-60);
  return {S:r.S,C:r.C,log,lastEv:a.ev,flash:{k:prev+'>'+r.S,n:st.flash.n+1},msg:r.msg!==undefined?r.msg:st.msg,acts:st.acts+1};
}
const init={S:'off',C:initCtx,log:[],lastEv:'—',flash:{k:'',n:0},msg:'',acts:0};

/* ===================== ICONS ===================== */
const Ic={
  power:<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="13.5" r="8" stroke="currentColor" strokeWidth="2"/><rect x="11" y="3" width="2" height="9.2" rx="1" fill="currentColor"/></svg>,
  volume:<svg viewBox="0 0 24 24" fill="none"><path d="M4 9 H8 L13 5 V19 L8 15 H4 Z" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"/><path d="M16 9 Q19 12 16 15" stroke="currentColor" strokeWidth="1.7"/></svg>,
  dual:<svg viewBox="0 0 34 28" fill="none"><path d="M6 8 V19 Q6 23 10 23 H24 Q28 23 28 19 V8" stroke="currentColor" strokeWidth="2"/><path d="M6 8 L3 5 M28 8 L31 5" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/><rect x="9" y="4" width="16" height="3" rx="1.5" fill="currentColor"/><rect x="10.5" y="17" width="13" height="2.4" rx="1.2" fill="currentColor"/></svg>,
  last:<svg viewBox="0 0 24 24" fill="none"><path d="M19 12.5 A7 7 0 1 1 12 5.5 H16.5" stroke="currentColor" strokeWidth="2"/><path d="M13.5 2.5 L16.8 5.5 L13.5 8.5" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  fav:<svg viewBox="0 0 24 24" fill="none"><path d="M12 3 L14.6 9.1 L21 9.6 L16.1 13.9 L17.7 20.3 L12 16.8 L6.3 20.3 L7.9 13.9 L3 9.6 L9.4 9.1 Z" stroke="currentColor" strokeWidth="1.7" strokeLinejoin="round"/></svg>,
  pause:<svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" stroke="currentColor" strokeWidth="1.6"/><rect x="12" y="10.5" width="3" height="11" rx="1.2" fill="currentColor"/><rect x="17" y="10.5" width="3" height="11" rx="1.2" fill="currentColor"/></svg>,
  light:<svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" stroke="currentColor" strokeWidth="1.6"/><path d="M16 8.5 a5 5 0 0 1 3 9 v1.6 h-6 v-1.6 a5 5 0 0 1 3 -9 Z" stroke="currentColor" strokeWidth="1.5"/><path d="M13.6 21.5 h4.8" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>,
  up:<svg viewBox="0 0 24 15" fill="none"><path d="M3 12 L12 3.5 L21 12" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  down:<svg viewBox="0 0 24 15" fill="none"><path d="M3 3.5 L12 12 L21 3.5" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"/></svg>,
};

/* ===================== PANEL ===================== */
const PRESETS_POS=[
  ['bake',30,31],['roast',42.5,31],['broil',55,31],['wings',68.5,31],['recrisp',82.5,31],
  ['toast',15.7,43],['veggies',30,43],['frozen snacks',48,43],['fries',65.6,43],['max crisp',80.4,43],
  ['keep warm',17.3,63],
];
function fmt(s){s=Math.max(0,Math.round(s));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}

function Panel({S,C,send}){
  const cooking=COOK.includes(S);
  const on=S!=='off';
  const pdis=!(on&&!cooking);
  const stepDis=!(on&&S!=='shakeAlert'&&S!=='shakeWaiting'&&S!=='basketOut');
  const dispVal = S==='off' ? '--:--' : fmt(cooking?C.rem:C.time);
  // hold logic for power & favorite
  const hold=(short,long)=>{let t,l=false;return{
    onPointerDown:()=>{l=false;t=setTimeout(()=>{l=true;long();},650);},
    onPointerUp:()=>{clearTimeout(t);if(!l)short();},
    onPointerLeave:()=>clearTimeout(t),
  };};
  return (
   <div className="panelwrap">
    <div className="panel">
      <svg className="bg" viewBox="0 0 485 372" preserveAspectRatio="none">
        <path d="M242.44 371.34L261.82 371.26 268.31 371.19 281.19 370.97 300.56 370.43 319.92 369.57 330.72 368.92 344.07 367.91 358.53 366.49 370.52 364.99 382.53 363.18 397.18 360.36 406.21 358.1 415.46 355.27 425.68 351.47 434.04 347.61 441.13 343.44 449.4 337.13 456.23 330.28C459 327 461.5 323.5 463.31 320.51C468.75 310.28 471.05 304.26 473.14 298.17L478.33 277.21 480.98 260.49 482.93 240.6 483.81 226.94 484.47 210.01 484.73 196.71 484.77 185.67 484.23 153.26 479.99 103.8 474.82 78.76C472 70 469 62 465.42 54.51C461.69 48.08 457.53 42.47 453.09 37.63C448.95 33.69 444.65 30.29 440.27 27.36C435.63 24.57 430 22 424.99 19.53L389.67 9.44 341.04 3.18 289.71 0.58 252.19 0.02 218.81 0.13 190.61 0.71 148.91 2.78 114.94 6.23C100 8 92 10 88.32 10.85C80.73 12.52 74 14 69.41 15.95C64 18 60 19 57.86 20.33L48.97 24.71C46 26 44 27 41.88 29.11C36.5 33.05 30.83 38.35 25.22 45.2L17.57 58.01C13.16 68.18 9.54 79.82 6.6 93.18L3.16 116.15 1.51 134.72 0.63 151.01 0.25 162.74 0.02 177.29 0 185.68 0.5 216.23 2.49 248.31 4.8 267.66 7.7 283.27 11.43 297.45 16.66 311.39 22.24 321.71 29.42 331.26 42.89 342.92 62.55 352.88 86.27 360.02 116.51 365.33 142.22 368.02 172.3 369.94 199.6 370.87 215.34 371.16 233.93 371.32 242.45 371.34" fill="#000"/>
      </svg>
      <div className="gloss"></div>
      <div className="layer">
        {/* top row */}
        <div className="c" style={{left:'20%',top:'14.5%'}} {...hold(()=>send('POWER'),()=>send('POWER_OFF'))}>{Ic.power}</div>
        <div className={"c"+(C.vol?' lit':'')} style={{left:'33.4%',top:'14%'}} onClick={()=>send('VOLUME_TOGGLE')}>{Ic.volume}<span className="lab">volume</span></div>
        <div className={"c"+(C.dual&&on?' lit':'')} style={{left:'50%',top:'14%'}}>{Ic.dual}<span className="lab" style={{fontSize:'12px'}}>DualHeat</span><div className="ul"></div></div>
        <div className={"c"+(pdis?' dis':'')} style={{left:'66.4%',top:'14%'}} onClick={()=>!pdis&&send('LAST_COOK')}>{Ic.last}<span className="lab">last cook</span></div>
        <div className={"c"+(pdis?' dis':'')} style={{left:'80%',top:'14%'}} {...hold(()=>send('FAVORITE'),()=>send('SAVE_FAVORITE'))}>{Ic.fav}<span className="lab">favorite</span></div>
        {/* presets */}
        {PRESETS_POS.map(([fn,x,y])=>(
          <div key={fn} className={"p"+(C.fn===fn&&on?' sel':'')+(pdis?' dis':'')} style={{left:x+'%',top:y+'%'}}
            onClick={()=>!pdis&&send('SELECT_FUNCTION',fn)}>{fn}</div>
        ))}
        {/* steppers + display */}
        <div className={"stepper"+(stepDis?' dis':'')} style={{left:'30.3%',top:'63%'}}>
          <div className="arr" onClick={()=>!stepDis&&send('ADJUST_TEMP',5)}>{Ic.up}</div>
          <div className="mid">temp</div>
          <div className="arr" onClick={()=>!stepDis&&send('ADJUST_TEMP',-5)}>{Ic.down}</div>
        </div>
        <div className="disp-wrap" style={{left:'49.9%',top:'63%'}}>
          <span className="ghost">{dispVal.replace(/[0-9]/g,'8')}</span>
          <span className={"disp"+(cooking?' cooking':'')}>{dispVal}</span>
        </div>
        <div className={"stepper"+(stepDis?' dis':'')} style={{left:'67.6%',top:'63%'}}>
          <div className="arr" onClick={()=>!stepDis&&send('ADJUST_TIME',30)}>{Ic.up}</div>
          <div className="mid">time</div>
          <div className="arr" onClick={()=>!stepDis&&send('ADJUST_TIME',-30)}>{Ic.down}</div>
        </div>
        <div className={"shake"+(C.shake?' lit':'')+(pdis?' dis':'')} style={{left:'81%',top:'63%'}}
          onClick={()=>!pdis&&send('TOGGLE_SHAKE')}>&#10218;&#10218; shake &#10219;&#10219;</div>
        {/* bottom row */}
        <div className={"c"+(!(cooking&&S!=='shakeAlert'&&S!=='shakeWaiting')?' dis':'')} style={{left:'32%',top:'86.5%'}}
          onClick={()=>send('PAUSE')}>{Ic.pause}</div>
        <div className={"startstop"+(on?' on':'')} style={{left:'49.9%',top:'86.5%'}} onClick={()=>send('START')}>
          <div className="t">start</div><div className="ln"></div><div className="t">stop</div></div>
        <div className={"c"+(C.light?' lit':'')} style={{left:'67.6%',top:'86.5%'}} onClick={()=>send('LIGHT_TOGGLE')}>{Ic.light}</div>
      </div>
    </div>
    <div className="hint">basket sensor → press <b>B</b> &nbsp;·&nbsp; +30s → press <b>A</b> &nbsp;·&nbsp; hold <b>power</b>=off, hold <b>fav</b>=save</div>
   </div>
  );
}

/* ===================== TERMINAL ===================== */
function Terminal({log}){
  const ref=useRef();
  useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight;},[log]);
  return(
   <div className="terminal">
     <div className="tbar"><i className="r"/><i className="y"/><i className="g"/><span>afc6@console — live event stream</span></div>
     <div className="tbody" ref={ref}>
       {log.length===0&&<div className="mt">&gt; waiting for input…</div>}
       {log.map((l,i)=>(
         <div key={i}><span className="mt">&gt;</span> <span className="ev">{l.ev}</span>{' '}
           {l.from!==l.to ? <span className="ar">{PRETTY[l.from]} → {PRETTY[l.to]}</span> : <span className="mt">{PRETTY[l.to]}</span>}</div>
       ))}
     </div>
   </div>
  );
}

/* ===================== STATE FLOW ===================== */
const POS={off:[230,33],idle:[230,111],set:[230,191],running:[230,300],paused:[85,300],basketOut:[375,300],shakeAlert:[85,398],shakeWaiting:[375,398],done:[230,505]};
const EDGES=[['off','idle'],['idle','set'],['set','running'],['running','done'],['running','paused'],['running','basketOut'],['running','shakeAlert'],['shakeAlert','shakeWaiting'],['shakeWaiting','running'],['done','set']];
const AUTOE=new Set(['running>done','running>shakeAlert','basketOut>set']);
const NODE_DEF=[
  ['off','offc','OFF','display dark'],['idle','offc','IDLE','ready · presets lit'],['set','happy','SET','time/temp · arm shake'],
  ['running','happy','COOKING','heat on · counting'],['paused','intc','PAUSED','frozen'],['basketOut','intc','BASKET OUT','auto-pause'],
  ['shakeAlert','intc','SHAKE ALERT','alarm · midpoint'],['shakeWaiting','intc','SHAKE','basket out'],['done','donec','DONE','beep · keep-warm'],
];
const NLEFT={off:169,idle:169,set:169,running:169,paused:24,basketOut:314,shakeAlert:24,shakeWaiting:314,done:169};
const NTOP={off:6,idle:84,set:164,running:270,paused:270,basketOut:270,shakeAlert:368,shakeWaiting:368,done:478};

function Flow({S,flash}){
  const[hot,setHot]=useState('');
  useEffect(()=>{setHot(flash.k);const id=setTimeout(()=>setHot(''),650);return()=>clearTimeout(id);},[flash.n]);
  return(
   <div className="card reveal" style={{animationDelay:'.15s'}}>
     <h2>State Flow</h2>
     <p className="now">live ▸ <b>{PRETTY[S]}</b></p>
     <div className="canvas">
       <div className="cookzone" style={{left:14,top:248,width:432,height:222}}><span>COOKING</span></div>
       <svg viewBox="0 0 460 560">
         <defs><marker id="ah" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#c4c4c4"/></marker></defs>
         {EDGES.map(([a,b])=>{const[x1,y1]=POS[a],[x2,y2]=POS[b];const k=a+'>'+b;const isHot=hot===k||hot===b+'>'+a;
           const auto=AUTOE.has(k);
           return<line key={k} x1={x1} y1={y1} x2={x2} y2={y2} stroke={isHot?'#f0892e':'#c9c9c9'} strokeWidth={isHot?3:1.6}
             markerEnd="url(#ah)" strokeDasharray={auto?'7 6':'0'}/>;})}
       </svg>
       {NODE_DEF.map(([id,cls,t,sub])=>(
         <div key={id} className={"node "+cls+(S===id?' active':'')} style={{left:NLEFT[id],top:NTOP[id]}}>{t}<small>{sub}</small></div>
       ))}
     </div>
     <div className="legend">
       <span className="sw" style={{background:'#fff4e7',border:'1.5px solid #e6983f'}}></span>active &nbsp;
       <span className="sw" style={{background:'#fff8e6',border:'1.5px solid #dcab3a'}}></span>interrupt &nbsp;
       <span className="sw" style={{background:'#edeee9',border:'1.5px solid #a7a39a'}}></span>off/idle &nbsp;
       <span className="sw" style={{background:'#e6f4ec',border:'1.5px solid #46a073'}}></span>done<br/>
       <b>solid</b>=button · <b>dashed</b>=auto/timeout · always: POWER_OFF · LIGHT/VOLUME · AUTO-OFF · KEEP-WARM
     </div>
   </div>
  );
}

const AVAIL={
  off:['POWER (on)'],idle:['select preset','adjust time/temp','LAST COOK*','FAVORITE*'],
  set:['select preset','adjust','toggle SHAKE','START','SAVE FAV','LAST/FAV'],
  running:['PAUSE','STOP','adjust','+30s','remove basket'],shakeAlert:['remove basket → shake'],
  shakeWaiting:['insert basket → resume'],paused:['START/PAUSE','STOP','remove basket'],
  basketOut:['insert basket','⏱ timeout→SET'],done:['POWER/STOP→SET','select preset','⏱ keep-warm→IDLE']};

function Telemetry({S,C}){
  const cooking=COOK.includes(S);
  return(
   <React.Fragment>
     <div className="card reveal" style={{animationDelay:'.22s'}}>
       <h2>Machine State</h2>
       <div className="kv">
         <span className="k">state</span><span className="v hot">{PRETTY[S]}</span>
         <span className="k">function</span><span className="v">{C.fn||'—'}</span>
         <span className="k">dual heat</span><span className={"v"+(C.dual&&S!=='off'?' hot':'')}>{C.dual&&S!=='off'?'ON':'off'}</span>
         <span className="k">time / temp</span><span className="v">{fmt(cooking?C.rem:C.time)} · {S==='off'?'—':C.temp+'°F'}</span>
         <span className="k">shake armed</span><span className="v">{C.shake?'yes':'no'}</span>
         <span className="k">basket</span><span className={"v"+(!C.basket?' warn':'')}>{C.basket?'locked':'REMOVED'}</span>
         <span className="k">light / volume</span><span className="v">{C.light?'on':'off'} / {C.vol?'on':'off'}</span>
       </div>
     </div>
     <div className="card reveal" style={{animationDelay:'.3s'}}>
       <h2>Available Now</h2>
       <div className="avail">
         {(AVAIL[S]||[]).map((e,i)=><span key={i} className={"pill"+(e.indexOf('⏱')>=0?' auto':'')}>{e}</span>)}
         <span className="pill glob">POWER_OFF (hold)</span><span className="pill glob">LIGHT</span><span className="pill glob">VOLUME</span>
       </div>
     </div>
   </React.Fragment>
  );
}

/* ===================== APP ===================== */
function App(){
  const[st,dispatch]=useReducer(reducer,init);
  const send=(ev,arg)=>dispatch({type:'SEND',ev,arg});
  const sendRef=useRef(send);sendRef.current=send;
  // tick
  useEffect(()=>{if(st.S!=='running')return;const id=setInterval(()=>sendRef.current('TICK'),1000);return()=>clearInterval(id);},[st.S]);
  // timeouts (re-arm on activity via st.acts)
  useEffect(()=>{let id;
    if(st.S==='idle'||st.S==='set')id=setTimeout(()=>sendRef.current('AUTO_OFF'),AUTO_OFF*1000);
    else if(st.S==='done')id=setTimeout(()=>sendRef.current('KEEP_WARM'),KEEP_WARM*1000);
    else if(st.S==='basketOut')id=setTimeout(()=>sendRef.current('BASKET_TIMEOUT'),BASKET_TO*1000);
    return()=>clearTimeout(id);},[st.S,st.acts]);
  // clear flash message
  useEffect(()=>{if(!st.msg)return;const id=setTimeout(()=>{ if(reducerMsgIs(st.msg)) dispatch({type:'SEND',ev:'__noop'}); },1700);return()=>clearTimeout(id);},[st.msg,st.acts]);
  // keyboard: basket + add30
  useEffect(()=>{const h=e=>{
    if(e.key==='b'||e.key==='B')sendRef.current(st.C.basket?'BASKET_REMOVED':'BASKET_INSERTED');
    if(e.key==='a'||e.key==='A')sendRef.current('ADD_30');
  };window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);},[st.C.basket]);

  const status=st.msg||({off:'standby',idle:'ready',set:(st.C.fn||'manual')+' — press start',running:'cooking',paused:'paused',shakeAlert:'shake now',shakeWaiting:'reinsert basket',basketOut:'basket out',done:'enjoy'})[st.S];
  return(
   <React.Fragment>
     <header>
       <div className="brand"><h1>AFC&#8209;6<b>.</b></h1><span className="tag">dual-heat air fryer · console</span></div>
       <div className="status"><span className="dot"></span> simulation active</div>
     </header>
     <main>
       <section className="stage reveal" style={{animationDelay:'.05s'}}>
         <Panel S={st.S} C={st.C} send={send}/>
         <div style={{textAlign:'center',fontFamily:'JetBrains Mono,monospace',fontSize:'12px',letterSpacing:'1px',color:'var(--mut)',marginTop:'-6px'}}>
           STATUS&nbsp;&nbsp;<span style={{color:st.msg?'var(--org-deep)':'var(--ink)',fontWeight:700}}>{status.toUpperCase()}</span></div>
         <Terminal log={st.log}/>
       </section>
       <aside className="rail">
         <Flow S={st.S} flash={st.flash}/>
         <Telemetry S={st.S} C={st.C}/>
       </aside>
     </main>
   </React.Fragment>
  );
}
function reducerMsgIs(){return false;}  /* messages clear naturally on next event; placeholder */
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

})();
</script>
